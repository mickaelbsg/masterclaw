services:
  masterclaw:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: masterclaw
    ports:
      - "3100:3100"
    environment:
      - PORT=3100
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    volumes:
      # Persiste apenas os arquivos de dados (config.json, memory.json)
      - masterclaw_data:/app/data
      # Monta .env.local se existir para desenvolvimento
      - ./.env.local:/app/.env:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3100/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  masterclaw_data:
    driver: local
